    <link rel="stylesheet" href="style1.css">
</head>
<body>

<header>
<div class="container">

    <!-- Navbar -->
    <nav>
        <div class="left-nav">
            <a href="signin.html">Sign In</a>
        </div>

        <div class="center-nav">
            <span>🔍</span>
            <a href="index.html">Home</a>
            <a href="play.html">Play Music</a>
            <a href="artist.html">Artists</a>
            <a href="recently.html">Recently Played</a>
        </div>

        <div class="right-nav">
            <div class="settings-box">
                <span>⚙</span>
                <a href="settings.html">Settings</a>
            </div>

            <div class="notification-box">
                <span>🔔</span>
                <a href="notification.html">Notifications</a>
            </div>

            <div class="profile-box">
                <img src="https://static.vecteezy.com/system/resources/thumbnails/000/435/728/small/1404.i033.096.S.m003.c10.Headphones_grunge.jpg">
                <a href="profile.html">Profile</a>
            </div>
        </div>
    </nav>
</header>
        <div class="form-container">
            <h2>Log In Page</h2>
            <form>
                <!-- Personal Information Section -->
                 <label for="fullName">Full Name</label>
                 <input type="text" id="fullName" name="fullName" required>
                 <label for="email">Email</label>
                 <input type="email" id="email" name="email" required>
                 <label for="phone">Phone Number</label>
                 <input type="tel" id="phone" name="phone" placeholder="1234567890" required>
                 <label>Select Your Favorite Music Artists</label>
                 <div class="checkbox-group">
                    <label><input type="checkbox" name="music" value="Pop"> Pop</label>
                    <label><input type="checkbox" name="music" value="Rock"> Rock</label>
                    <label><input type="checkbox" name="music" value="Hip Hop"> Hip Hop</label>
                    <label><input type="checkbox" name="music" value="Classical"> Classical</label>
                    <label><input type="checkbox" name="music" value="Jazz"> Jazz</label>
                </div>


                <!-- Buttons -->
                 <div class="button-group">
                    <button type="submit" class="submit-btn">Submit</button>
                    <button type="reset" class="reset-btn">Reset</button>
                </div>
            </form>
        </div>
        <footer>
            Your Details For Login | Designed by Anandita Upmanyu
        </footer>
        <script src="script.js"></script>
    </body>
</html>
